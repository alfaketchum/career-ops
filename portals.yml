# Portal Scanner Configuration
# Strategy: Job board aggregator queries (top-down, spray-and-pray)
#
# Instead of tracking individual company careers pages, we search
# job aggregators that already index thousands of companies
# (LinkedIn, Indeed, Glassdoor, BuiltIn, WeWorkRemotely, etc.)
#
# The scanner runs WebSearch queries below, filters by title keywords,
# deduplicates, and adds new matches to pipeline.md.

# -- Title filter --
title_filter:
  positive:
    # -- Finance / Analyst roles --
    - "Financial Analyst"
    - "Finance Analyst"
    - "Credit Analyst"
    - "Risk Analyst"
    - "Business Analyst"
    - "Strategy Analyst"
    - "Investment Analyst"
    - "Portfolio Analyst"
    - "FP&A"
    - "Financial Planning"
    - "Budget Analyst"
    - "Corporate Finance"
    - "Treasury"
    # -- Business / Strategy roles --
    - "Business Strategy"
    - "Strategy Manager"
    - "Strategy Associate"
    - "Business Operations"
    - "BizOps"
    - "Operations Analyst"
    - "Program Manager"
    - "Project Manager"
    # -- BD / Partnerships --
    - "Business Development"
    - "Partnerships"
    - "Partner Manager"
    - "BD Manager"
    # -- Broader net --
    - "Data Analyst"
    - "Reporting Analyst"
    - "Revenue Analyst"
    - "Compliance Analyst"
    # -- Crypto / Fintech specific --
    - "DeFi"
    - "Web3 Strategy"
    - "Crypto Analyst"
    - "Token"
    # -- Influencer / Marketing --
    - "Influencer Marketing"
    - "Creator Partnerships"
    - "Creator Economy"
  negative:
    - "Junior"
    - "Intern"
    - "Internship"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Nurse"
    - "Physician"
    - "Dental"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

# -- Search queries --
# Top-down approach: search job aggregators that index all public companies.
# Each query is a WebSearch. Mix of role types × job boards for maximum coverage.

search_queries:

  # ===== LINKEDIN =====
  - name: LinkedIn — Financial Analyst Remote
    query: 'site:linkedin.com/jobs "Financial Analyst" OR "Finance Analyst" remote'
    enabled: true

  - name: LinkedIn — Credit Risk Analyst Remote
    query: 'site:linkedin.com/jobs "Credit Analyst" OR "Risk Analyst" remote'
    enabled: true

  - name: LinkedIn — Business Analyst Remote
    query: 'site:linkedin.com/jobs "Business Analyst" OR "Strategy Analyst" remote'
    enabled: true

  - name: LinkedIn — FP&A Remote
    query: 'site:linkedin.com/jobs "FP&A" OR "Financial Planning" remote'
    enabled: true

  - name: LinkedIn — BD Partnerships Remote
    query: 'site:linkedin.com/jobs "Business Development" OR "Partnerships Manager" remote'
    enabled: true

  - name: LinkedIn — BizOps Remote
    query: 'site:linkedin.com/jobs "Business Operations" OR "BizOps" OR "Operations Analyst" remote'
    enabled: true

  - name: LinkedIn — Program Manager Remote
    query: 'site:linkedin.com/jobs "Program Manager" OR "Project Manager" remote finance OR fintech'
    enabled: true

  - name: LinkedIn — Data Analyst Remote
    query: 'site:linkedin.com/jobs "Data Analyst" OR "Reporting Analyst" remote'
    enabled: true

  - name: LinkedIn — Compliance Analyst Remote
    query: 'site:linkedin.com/jobs "Compliance Analyst" OR "Compliance Manager" remote'
    enabled: true

  - name: LinkedIn — Influencer Marketing Remote
    query: 'site:linkedin.com/jobs "Influencer Marketing" OR "Creator Partnerships" remote'
    enabled: true

  # ===== INDEED =====
  - name: Indeed — Financial Analyst Remote
    query: 'site:indeed.com "Financial Analyst" OR "Credit Analyst" remote'
    enabled: true

  - name: Indeed — Business Analyst Remote
    query: 'site:indeed.com "Business Analyst" OR "Strategy Analyst" remote'
    enabled: true

  - name: Indeed — FP&A Remote
    query: 'site:indeed.com "FP&A" OR "Financial Planning" OR "Budget Analyst" remote'
    enabled: true

  - name: Indeed — BD Partnerships Remote
    query: 'site:indeed.com "Business Development" OR "Partnerships" remote'
    enabled: true

  - name: Indeed — Operations Analyst Remote
    query: 'site:indeed.com "Operations Analyst" OR "Business Operations" remote'
    enabled: true

  # ===== GLASSDOOR =====
  - name: Glassdoor — Financial Analyst Remote
    query: 'site:glassdoor.com/job "Financial Analyst" OR "Credit Analyst" remote'
    enabled: true

  - name: Glassdoor — Business Analyst Remote
    query: 'site:glassdoor.com/job "Business Analyst" OR "Strategy Analyst" remote'
    enabled: true

  - name: Glassdoor — BD Partnerships Remote
    query: 'site:glassdoor.com/job "Business Development" OR "Partnerships" remote'
    enabled: true

  # ===== BUILTIN =====
  - name: BuiltIn — Financial Analyst Remote
    query: 'site:builtin.com/job "Financial Analyst" OR "Finance" remote'
    enabled: true

  - name: BuiltIn — Business Analyst Remote
    query: 'site:builtin.com/job "Business Analyst" OR "Strategy" remote'
    enabled: true

  - name: BuiltIn — BD Partnerships Remote
    query: 'site:builtin.com/job "Business Development" OR "Partnerships" remote'
    enabled: true

  # ===== WEWORKREMOTELY =====
  - name: WeWorkRemotely — Finance
    query: 'site:weworkremotely.com "Financial Analyst" OR "Finance" OR "FP&A"'
    enabled: true

  - name: WeWorkRemotely — Business Ops
    query: 'site:weworkremotely.com "Business" OR "Operations" OR "Strategy"'
    enabled: true

  # ===== CRYPTO / WEB3 JOB BOARDS =====
  - name: CryptoJobsList — Strategy BD
    query: 'site:cryptojobslist.com "Strategy" OR "Business Development" OR "Partnerships" remote'
    enabled: true

  - name: Web3 Career — BD Strategy
    query: 'site:web3.career "Business Development" OR "Strategy" OR "Partnerships"'
    enabled: true

  # ===== REMOTE-SPECIFIC BOARDS =====
  - name: RemoteOK — Finance Analyst
    query: 'site:remoteok.com "Finance" OR "Analyst" OR "FP&A"'
    enabled: true

  - name: FlexJobs — Financial Analyst
    query: 'site:flexjobs.com "Financial Analyst" OR "Business Analyst" OR "Credit Analyst" remote'
    enabled: true

  # ===== GREENHOUSE / LEVER / ASHBY (cross-company) =====
  - name: Greenhouse — Financial Analyst
    query: 'site:boards.greenhouse.io "Financial Analyst" OR "Credit Analyst" OR "FP&A"'
    enabled: true

  - name: Greenhouse — Business Analyst
    query: 'site:boards.greenhouse.io "Business Analyst" OR "Strategy" OR "Business Development"'
    enabled: true

  - name: Greenhouse — Partnerships
    query: 'site:boards.greenhouse.io "Partnerships" OR "Partner Manager" OR "BD Manager"'
    enabled: true

  - name: Lever — Financial Analyst
    query: 'site:jobs.lever.co "Financial Analyst" OR "Credit Analyst" OR "FP&A"'
    enabled: true

  - name: Lever — Business BD
    query: 'site:jobs.lever.co "Business Analyst" OR "Business Development" OR "Partnerships"'
    enabled: true

  - name: Ashby — Financial Analyst
    query: 'site:jobs.ashbyhq.com "Financial Analyst" OR "Credit Analyst" OR "Business Analyst"'
    enabled: true

  - name: Ashby — BD Partnerships
    query: 'site:jobs.ashbyhq.com "Business Development" OR "Partnerships" OR "Strategy"'
    enabled: true

# -- Tracked companies --
# Optional: Add specific companies you want to check directly.
# These get Playwright-scanned (Level 1) in addition to the job board queries above.
# Only add companies you'd proactively apply to.

tracked_companies: []
  # Example:
  # - name: "Moody's"
  #   careers_url: "https://careers.moodys.com"
  #   enabled: true
  # - name: "S&P Global"
  #   careers_url: "https://careers.spglobal.com"
  #   enabled: true
