<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>career-ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidepanel">
      <div class="sidepanel-brand">
        <div class="logomark">&#9889;</div>
        <div class="sidepanel-brand-text">
          <div class="title">career-ops</div>
          <div class="tagline">Always Be Applying</div>
        </div>
      </div>

      <nav id="tabs" class="sidepanel-nav"></nav>

      <div class="sidepanel-footer">
        <div class="sidepanel-status">
          <span id="connection-status" class="dot"></span>
          <span id="last-updated">&mdash;</span>
        </div>
        <div class="sidepanel-hint">refresh: <kbd>R</kbd></div>
      </div>
    </aside>

    <div class="main-area">
      <header class="hero">
        <div class="hero-inner">
          <div class="hero-stats" id="hero-stats">
            <div class="hero-stat">
              <span class="hero-stat-value">&mdash;</span>
              <span class="hero-stat-label">Total Jobs</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-value">&mdash;</span>
              <span class="hero-stat-label">Applied</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-value">&mdash;</span>
              <span class="hero-stat-label">Interviews</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-value">&mdash;</span>
              <span class="hero-stat-label">Avg Score</span>
            </div>
          </div>
        </div>
      </header>

      <div class="next-step" id="next-step"></div>

      <main id="content">
        <div class="loading">Loading&hellip;</div>
      </main>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
